<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    :root {
      --bg:      #fbf7f2;
      --card:    #fffdf9;
      --border:  #ede6dc;
      --accent:  #b08d6a;
      --text:    #3e3a36;
      --muted:   #7a6854;
      --head:    #5f4e3c;
      --pill:    #f3ede7;
      --pill-b:  #d6c9bc;
      --inp:     #fefcf9;
      --inp-b:   #ddd2c6;
      --todo-bg: #fefbf8;
      --todo-b:  #e6ddd4;
      --serif:   'Georgia', 'Times New Roman', serif;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28vh 20px 20px;
    }

    body > div {
      width: 100%;
      max-width: 620px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
    }

    h1 { font-size: 2.6rem; font-weight: 400; color: var(--head); border-bottom: 2px solid var(--border); padding-bottom: 16px; margin-bottom: 8px; }
    h3 { font-size: 1.3rem; font-weight: 400; color: var(--muted); border-bottom: 1px dashed var(--inp-b); padding-bottom: 6px; margin: 24px 0 12px; }

    input {
      display: block;
      width: 100%;
      padding: 11px 16px;
      margin: 8px 0;
      border: 1px solid var(--inp-b);
      border-radius: 12px;
      font-size: 1rem;
      font-family: var(--serif);
      background: #fdf8f3;
      color: var(--text);
      transition: border-color 0.2s, border-left-width 0.15s;
    }
    input:focus { outline: none; border-color: var(--inp-b); border-bottom-color: var(--accent); border-left: 3px solid var(--accent); }

    button {
      padding: 12px 28px;
      margin: 12px 8px 12px 0;
      border: 1px solid var(--pill-b);
      border-radius: 40px;
      font-size: 1rem;
      font-family: var(--serif);
      cursor: pointer;
      background: var(--pill);
      color: var(--head);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    button:hover  { background: #e7ddd2; border-color: var(--accent); transform: translateY(-1px); }
    button:active { transform: translateY(1px); background: #ddd0c2; }

    /* tabs */
    .tab-bar { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
    .tab { flex: 1; border: none; border-radius: 30px 30px 0 0; border-bottom: 3px solid transparent; margin: 0; padding: 14px 20px; font-size: 1.2rem; background: transparent; color: #8f8170; box-shadow: none; }
    .tab:hover  { background: var(--pill); transform: none; }
    .tab.active { color: var(--head); border-bottom-color: var(--accent); font-weight: 600; background: transparent; }
    .tab-panel         { display: none; }
    .tab-panel.active  { display: block; }
    .tab-panel input   { margin-bottom: 16px; }
    .tab-panel button  { margin: 8px 0 0; padding: 14px; font-size: 1.1rem; }

    /* user bar */
    .user-bar { display: flex; align-items: center; justify-content: space-between; background: var(--pill); border: 1px solid var(--inp-b); border-radius: 50px; padding: 14px 22px; margin: 8px 0 20px; }
    .user-bar b { font-size: 1.2rem; color: var(--head); }
    .user-bar button { margin: 0; padding: 8px 22px; font-size: 0.95rem; }
    #todo-view input  { margin-bottom: 12px; }
    #todo-view > button { margin-top: 4px; }

    /* todo items */
    .todo { display: flex; align-items: center; gap: 16px; padding: 16px 18px; margin: 10px 0; background: var(--todo-bg); border: 1px solid var(--todo-b); border-radius: 14px; transition: box-shadow 0.2s, border-color 0.2s; }
    .todo:hover { border-color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
    .todo.done  { opacity: 0.7; background: #f9f5f0; }
    .todo input[type="checkbox"] { width: 20px; height: 20px; margin: 0; padding: 0; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .todo-content { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .todo-title   { font-size: 1.05rem; color: var(--text); }
    .todo-desc    { font-size: 0.88rem; color: var(--muted); font-style: italic; word-break: break-word; }
    .todo.done .todo-title,
    .todo.done .todo-desc { text-decoration: line-through; color: #9b8e80; }
    .todo button { margin: 0; padding: 6px 16px; font-size: 0.85rem; border-color: var(--todo-b); background: transparent; color: var(--muted); }
    .todo button:hover { background: #f1e4d8; border-color: var(--accent); color: var(--head); transform: scale(1.02); }

    /* misc */
    #message { padding: 14px 20px; margin: 16px 0 8px; border-radius: 30px; border-left: 6px solid var(--accent); background: var(--pill); color: var(--head); }
    .empty { text-align: center; padding: 42px 20px; color: var(--muted); font-style: italic; background: #faf7f3; border-radius: 24px; border: 1px dashed var(--pill-b); margin-top: 20px; }
    .hidden { display: none; }
    ::placeholder { color: #b2a18e; opacity: 0.7; font-style: italic; }

    @media (max-width: 500px) {
      body > div { padding: 28px 18px; }
      h1 { font-size: 2rem; }
      .todo { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <div>
    <h1>Todo</h1>
    <p id="message" class="hidden"></p>

    <div id="login-view">
      <div class="tab-bar">
        <button id="tab-login" class="tab active" onclick="switchTab('login')">Login</button>
        <button id="tab-register" class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="login-form" class="tab-panel active">
        <input id="email" type="email" placeholder="Email" autocomplete="email">
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">
        <button onclick="login()">Sign In</button>
      </div>

      <div id="register-form" class="tab-panel">
        <input id="reg-username" placeholder="Username" autocomplete="username">
        <input id="reg-email" type="email" placeholder="Email" autocomplete="email">
        <input id="reg-password" type="password" placeholder="Password" autocomplete="new-password">
        <button onclick="register()">Create Account</button>
      </div>
    </div>

    <div id="todo-view" class="hidden">
      <div class="user-bar">
        Hello, <b id="user-name"></b>
        <button onclick="logout()">Logout</button>
      </div>

      <h3>Add a note</h3>
      <input id="todo-title" placeholder="Title" autocomplete="off">
      <input id="todo-desc" placeholder="Description" autocomplete="off">
      <button onclick="addTodo()">Add Todo</button>

      <h3>Your list</h3>
      <div id="todo-list"></div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('token');
    let username = localStorage.getItem('username');

    const $ = id => document.getElementById(id);
    const msg = (text, show = true) => { $('message').textContent = text; $('message').classList.toggle('hidden', !show); };

    function setView(view) {
      const isTodo = view === 'todo';
      $('login-view').classList.toggle('hidden', isTodo);
      $('todo-view').classList.toggle('hidden', !isTodo);
      if (isTodo) { msg('', false); $('user-name').textContent = username; loadTodos(); }
    }

    token ? setView('todo') : setView('login');

    function switchTab(tab) {
      ['login', 'register'].forEach(t => {
        $('tab-' + t).classList.toggle('active', t === tab);
        $(t + '-form').classList.toggle('active', t === tab);
      });
      msg('', false);
    }

    async function login() {
      const email = $('email').value.trim();
      const password = $('password').value;
      if (!email) { msg('Please enter your email.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { msg('Please enter a valid email address.'); return; }
      if (!password) { msg('Please enter your password.'); return; }
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.error) { msg(data.error); return; }
      token = data.token; username = data.username;
      localStorage.setItem('token', token);
      localStorage.setItem('username', username);
      setView('todo');
    }

    async function register() {
      const username_ = $('reg-username').value.trim();
      const email = $('reg-email').value.trim();
      const password = $('reg-password').value;
      if (!username_) { msg('Please enter a username.'); return; }
      if (username_.length < 3) { msg('Username must be at least 3 characters.'); return; }
      if (!email) { msg('Please enter your email.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { msg('Please enter a valid email address.'); return; }
      if (!password) { msg('Please enter a password.'); return; }
      if (password.length < 6) { msg('Password must be at least 6 characters.'); return; }
      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username_, email, password })
      });
      const data = await res.json();
      if (data.error) { msg(data.error); return; }
      token = data.token; username = data.username;
      localStorage.setItem('token', token);
      localStorage.setItem('username', username);
      setView('todo');
    }

    function logout() {
      token = username = null;
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      setView('login');
      switchTab('login');
      ['email','password','reg-username','reg-email','reg-password'].forEach(id => $(id).value = '');
    }

    async function loadTodos() {
      const res = await fetch('/todos', { headers: { 'Authorization': 'Bearer ' + token } });
      const todos = await res.json();
      $('todo-list').innerHTML = todos.length
        ? todos.map(t => `
          <div class="todo${t.done ? ' done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id}, this.checked)">
            <div class="todo-content">
              <span class="todo-title">${t.title}</span>
              ${t.description ? `<span class="todo-desc">${t.description}</span>` : ''}
            </div>
            <button onclick="del(${t.id})">Delete</button>
          </div>`).join('')
        : '<div class="empty">Your list is quiet … add something.</div>';
    }
    async function addTodo() {
      const title = $('todo-title').value.trim();
      const description = $('todo-desc').value.trim();
      if (!title) { msg('Please enter a title for your todo.'); return; }
      if (title.length > 100) { msg('Title must be under 100 characters.'); return; }
      if (description.length > 300) { msg('Description must be under 300 characters.'); return; }
      const res = await fetch('/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ title, description })
      });
      if (res.ok) { $('todo-title').value = ''; $('todo-desc').value = ''; loadTodos(); }
    }

    async function toggle(id, checked) {
      await fetch('/todos/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ done: checked ? 1 : 0 })
      });
      loadTodos();
    }

    async function del(id) {
      await fetch('/todos/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      loadTodos();
    }
  </script>
</body>
</html>
